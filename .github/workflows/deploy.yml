name: Minify and Deploy to GitHub Pages

on:
  # This triggers the workflow every time you push to the main branch
  push:
    branches: ["main"]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions for the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Terser (Minifier)
        run: npm install -g terser

      - name: Minify JavaScript files
        # This loops through your js folder and minifies your files.
        # It overwrites them in the runner's workspace, leaving your main branch untouched.
        run: |
          terser js/app.js -o js/app.js -c -m
          terser js/router.js -o js/router.js -c -m
          terser js/auth.js -o js/auth.js -c -m
          terser js/config.js -o js/config.js -c -m
          terser js/aws-intercept.js -o js/aws-intercept.js -c -m

      - name: Assemble final artifact
        run: |
          mkdir _site
          rsync -av --exclude='.git' --exclude='.github' --exclude='soc-sim-src' --exclude='_site' . _site/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
